{{/*
  Renders a Lucide icon.

  Params:
    name  — icon key from data/lucide.yaml (required)
    size  — width and height in px (default: 16)
    class — extra CSS class on the <svg> (optional)

  Example:
    {{ partial "utils/lucide.html" (dict "name" "chevron-up" "size" 16) }}
*/}}
{{- $name  := .name -}}
{{- $size  := .size  | default 16 -}}
{{- $class := .class | default "" -}}
{{- $inner := index hugo.Data.lucide $name -}}
{{- if $inner -}}
<svg xmlns="http://www.w3.org/2000/svg"
     width="{{ $size }}" height="{{ $size }}"
     viewBox="0 0 24 24"
     fill="none"
     stroke="currentColor"
     stroke-width="2"
     stroke-linecap="round"
     stroke-linejoin="round"
     {{- if $class }} class="{{ $class }}"{{ end }}
     aria-hidden="true">{{ $inner | safeHTML }}</svg>
{{- else -}}
{{- warnf "lucide.html: unknown icon %q — add it to data/lucide.yaml" $name -}}
{{- end -}}
