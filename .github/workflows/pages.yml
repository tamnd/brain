name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.160.1"
    steps:
      # Blobless clone: full commit history (needed for enableGitInfo lastmod)
      # but skips downloading historical file blobs — much faster on large repos.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Cache the Hugo binary by version so it is only downloaded once.
      - name: Cache Hugo binary
        id: hugo-bin-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/hugo
          key: hugo-bin-${{ runner.os }}-${{ env.HUGO_VERSION }}-extended

      - name: Install Hugo
        if: steps.hugo-bin-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            | tar -xz hugo
          sudo mv hugo /usr/local/bin/hugo

      # Cache Hugo's processed asset pipeline output (CSS, image transforms).
      # Busts when theme Go deps, raw assets, or layout templates change.
      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: resources/_gen
          key: hugo-resources-${{ runner.os }}-${{ hashFiles('go.sum', 'assets/**', 'layouts/**') }}
          restore-keys: hugo-resources-${{ runner.os }}-

      - name: Build
        run: hugo --minify --gc

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
