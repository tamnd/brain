name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES_BASE_URL: https://tamnd.github.io/brain/
      GITHUB_PAGES_BASE_PATH: /brain
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Checkout tago
        uses: actions/checkout@v6.0.2
        with:
          repository: tamnd/tago
          path: .tago-src
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: .tago-src/go.mod
          cache: false

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0

      - name: Cache tago binary
        id: tago-bin-cache
        uses: actions/cache@v5.0.5
        with:
          path: /usr/local/bin/tago
          key: tago-bin-${{ runner.os }}-${{ hashFiles('.tago-src/go.sum', '.tago-src/**/*.go') }}

      - name: Build tago
        if: steps.tago-bin-cache.outputs.cache-hit != 'true'
        run: |
          cd .tago-src
          go build -o /usr/local/bin/tago ./cmd/tago/

      - name: Build site
        run: tago build --clean --base-url "${GITHUB_PAGES_BASE_URL}"

      - name: Prepare GitHub Pages artifact
        run: |
          find public -size +24M -print -delete
          # TAOCP solutions (~31 MB) are excluded from GitHub Pages to stay under the 1 GB limit.
          # They remain available on the primary Tago deployment (brain.tamnd.com).
          rm -rf public/practice/maths/taocp public/tags/taocp
          touch public/.nojekyll
          python3 scripts/rewrite_github_pages_base.py public --base-path "${GITHUB_PAGES_BASE_PATH}"
          bytes="$(find public -type f -print0 | xargs -0 stat -c %s | awk '{s+=$1} END {print s+0}')"
          files="$(find public -type f | wc -l | tr -d ' ')"
          echo "GitHub Pages artifact: $files files, $bytes bytes"
          if [ "$bytes" -gt 1000000000 ]; then
            echo "::error::GitHub Pages published site limit is 1 GB; artifact is $bytes bytes"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
