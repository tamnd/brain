name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.160.1"
      HUGO_BASEURL: "https://brain.tamnd.com/"
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Hugo binary
        id: hugo-bin-cache
        uses: actions/cache@v5.0.5
        with:
          path: /usr/local/bin/hugo
          key: hugo-bin-${{ runner.os }}-${{ env.HUGO_VERSION }}-extended

      - name: Install Hugo
        if: steps.hugo-bin-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            | tar -xz hugo
          sudo mv hugo /usr/local/bin/hugo

      - name: Cache Hugo resources
        uses: actions/cache@v5.0.5
        with:
          path: resources/_gen
          key: hugo-resources-${{ runner.os }}-${{ hashFiles('go.sum', 'assets/**', 'layouts/**') }}
          restore-keys: hugo-resources-${{ runner.os }}-

      - name: Build
        run: hugo --minify --gc --baseURL "${HUGO_BASEURL}"

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=brain --branch=main
