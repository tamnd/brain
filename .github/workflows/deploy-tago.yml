name: Deploy (tago)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Checkout tago
        uses: actions/checkout@v6.0.2
        with:
          repository: tamnd/tago
          path: .tago-src
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: .tago-src/go.mod
          cache: false

      - name: Cache tago binary
        id: tago-bin-cache
        uses: actions/cache@v5.0.5
        with:
          path: /usr/local/bin/tago
          key: tago-bin-${{ runner.os }}-${{ hashFiles('.tago-src/go.sum', '.tago-src/**/*.go') }}

      - name: Build tago
        if: steps.tago-bin-cache.outputs.cache-hit != 'true'
        run: |
          cd .tago-src
          go build -o /usr/local/bin/tago ./cmd/tago/

      - name: Cache tago output (incremental)
        uses: actions/cache@v5.0.5
        with:
          path: public
          key: tago-output-${{ runner.os }}-${{ github.sha }}
          restore-keys: tago-output-${{ runner.os }}-

      - name: Build site
        run: tago build --base-url "https://brain.tamnd.com/"

      - name: Remove cache db before deploy
        run: rm -f public/.tago-cache.db

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=brain --branch=main
