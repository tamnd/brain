name: Deploy (tago)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Checkout tago
        uses: actions/checkout@v6.0.2
        with:
          repository: tamnd/tago
          path: .tago-src
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: .tago-src/go.mod
          cache: false

      - name: Cache tago binary
        id: tago-bin-cache
        uses: actions/cache@v5.0.5
        with:
          path: /usr/local/bin/tago
          key: tago-bin-${{ runner.os }}-${{ hashFiles('.tago-src/go.sum', '.tago-src/**/*.go') }}

      - name: Build tago
        if: steps.tago-bin-cache.outputs.cache-hit != 'true'
        run: |
          cd .tago-src
          go build -o /usr/local/bin/tago ./cmd/tago/

      - name: Cache tago DB
        uses: actions/cache@v5.0.5
        with:
          path: .tago-cache.db
          key: tago-db-${{ runner.os }}-${{ github.sha }}
          restore-keys: tago-db-${{ runner.os }}-

      - name: Cache tago output (incremental)
        uses: actions/cache@v5.0.5
        with:
          path: public
          key: tago-output-${{ runner.os }}-${{ hashFiles('.tago-src/go.sum') }}-${{ github.sha }}
          restore-keys: tago-output-${{ runner.os }}-${{ hashFiles('.tago-src/go.sum') }}-

      - name: Build site
        run: |
          mkdir -p public
          [ -f .tago-cache.db ] && cp .tago-cache.db public/.tago-cache.db || true
          tago build --base-url "https://brain.tamnd.com/"
          cp public/.tago-cache.db .tago-cache.db 2>/dev/null || true

      - name: Export source markdown for Accept:text/markdown support
        run: |
          cd content/en
          find . -name "*.md" | while IFS= read -r f; do
            rel="${f#./}"
            dir="$(dirname "$rel")"
            base="$(basename "$rel" .md)"
            if [ "$base" = "_index" ]; then
              dest="../../public/$dir/index.md"
            else
              dest="../../public/$dir/$base/index.md"
            fi
            mkdir -p "$(dirname "$dest")"
            cp "$rel" "$dest"
          done
          cd ../..
          echo "Exported $(find public -name '*.md' | wc -l) markdown files to public/"

      - name: Remove oversized files before deploy
        run: find public -size +24M -print -delete

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=brain --branch=main
