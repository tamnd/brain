name: Deploy (tago)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Checkout tago
        uses: actions/checkout@v6.0.2
        with:
          repository: tamnd/tago
          path: .tago-src
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: .tago-src/go.mod
          cache: false

      - name: Cache tago binary
        id: tago-bin-cache
        uses: actions/cache@v5.0.5
        with:
          path: /usr/local/bin/tago
          key: tago-bin-${{ runner.os }}-${{ hashFiles('.tago-src/go.sum', '.tago-src/**/*.go') }}

      - name: Build tago
        if: steps.tago-bin-cache.outputs.cache-hit != 'true'
        run: |
          cd .tago-src
          go build -o /usr/local/bin/tago ./cmd/tago/

      - name: Build site
        run: |
          tago build --clean --base-url "https://brain.tamnd.com/"
          # tago fingerprints .js files, so copy worker explicitly
          [ -f static/_worker.js ] && cp static/_worker.js public/_worker.js || true

      - name: Remove oversized files before deploy
        run: find public -size +24M -print -delete

      - name: Check deploy file count
        run: |
          count="$(find public -type f | wc -l | tr -d ' ')"
          echo "Deploying $count files"
          if [ "$count" -gt 20000 ]; then
            echo "::error::Cloudflare Pages limit is 20000 files; public contains $count"
            exit 1
          fi

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=brain --branch=main --commit-dirty=true
