name: Deploy (tago)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          # Shallow by default; deepened below only when lastmods cache is cold.
          fetch-depth: 1

      - name: Checkout tago
        uses: actions/checkout@v7.0.0
        with:
          repository: tamnd/tago
          path: .tago-src
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: .tago-src/go.mod
          cache: true
          cache-dependency-path: .tago-src/go.sum

      - name: Cache tago binary
        id: tago-bin-cache
        uses: actions/cache@v5.0.5
        with:
          path: /usr/local/bin/tago
          key: tago-bin-${{ runner.os }}-${{ hashFiles('.tago-src/go.sum', '.tago-src/**/*.go') }}

      - name: Build tago
        if: steps.tago-bin-cache.outputs.cache-hit != 'true'
        run: |
          cd .tago-src
          go build -o /usr/local/bin/tago ./cmd/tago/

      - name: Restore incremental site cache
        id: tago-public-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: public
          key: tago-public-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            tago-public-${{ runner.os }}-${{ github.ref_name }}-
            tago-public-${{ runner.os }}-main-

      - name: Restore lastmods cache
        id: lastmods-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: content-lastmods.json
          key: lastmods-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            lastmods-${{ runner.os }}-

      - name: Restore split outputs cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: |
            public-main
            public-shards
            public-manifest.json
          key: tago-split-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            tago-split-${{ runner.os }}-${{ github.ref_name }}-
            tago-split-${{ runner.os }}-main-

      - name: Deepen git history (only when no cached lastmods found)
        if: hashFiles('content-lastmods.json') == ''
        run: git fetch --unshallow

      - name: Build site
        run: |
          tago build --base-url "https://brain.tamnd.com/"
          # tago fingerprints .js files, so copy worker explicitly
          [ -f static/_worker.js ] && cp static/_worker.js public/_worker.js || true

      - name: Split Cloudflare Pages outputs
        run: |
          tago split --incremental
          cat deploy-shards-summary.json

      - name: Save incremental site cache
        uses: actions/cache/save@v5.0.5
        with:
          path: public
          key: tago-public-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Save split outputs cache
        uses: actions/cache/save@v5.0.5
        with:
          path: |
            public-main
            public-shards
            public-manifest.json
          key: tago-split-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Save lastmods cache
        uses: actions/cache/save@v5.0.5
        with:
          path: content-lastmods.json
          key: lastmods-${{ runner.os }}-${{ github.sha }}

      - name: Upload main artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: public-main
          path: public-main
          retention-days: 1

      - name: Upload LeetCode artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: public-leetcode
          path: public-shards/leetcode
          retention-days: 1

      - name: Upload Codeforces artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: public-codeforces
          path: public-shards/codeforces
          retention-days: 1

      - name: Upload Codeforces-2 artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: public-codeforces-2
          path: public-shards/codeforces-2
          retention-days: 1

      - name: Upload Kvant artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: public-kvant
          path: public-shards/kvant
          retention-days: 1

      - name: Upload TAOCP artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: public-taocp
          path: public-shards/taocp
          retention-days: 1

  deploy-shards:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: leetcode
            project: brain-leetcode
            domain: leetcode.tamnd.com
          - name: codeforces
            project: brain-codeforces
            domain: codeforces.tamnd.com
          - name: codeforces-2
            project: brain-codeforces-2
            domain: codeforces-2.tamnd.com
          - name: kvant
            project: brain-kvant
            domain: kvant.tamnd.com
          - name: taocp
            project: brain-taocp
            domain: taocp.tamnd.com
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1
          sparse-checkout: scripts/

      - name: Download shard artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: public-${{ matrix.shard.name }}
          path: public-shards/${{ matrix.shard.name }}

      - name: Ensure Cloudflare Pages config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python3 scripts/ensure_cloudflare_pages.py --project "${{ matrix.shard.project }}" --domain "${{ matrix.shard.domain }}" --zone tamnd.com

      - name: Deploy ${{ matrix.shard.name }} to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler@4 pages deploy public-shards/${{ matrix.shard.name }} \
            --project-name=${{ matrix.shard.project }} \
            --branch=main \
            --commit-dirty=true

  deploy-main:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1
          sparse-checkout: scripts/

      - name: Download main artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: public-main
          path: public-main

      - name: Ensure Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python3 scripts/ensure_cloudflare_pages.py --project brain

      - name: Publish brain to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler@4 pages deploy public-main \
            --project-name=brain \
            --branch=main \
            --commit-dirty=true
