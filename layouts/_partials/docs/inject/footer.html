{{ with .Params.tags }}
<div class="book-tags">
  <span class="book-tags-label">Tags:</span>
  {{ range . }}
  <a href="{{ printf "tags/%s/" (. | urlize) | absLangURL }}" class="book-badge default">
    <span class="book-badge-value">{{ . }}</span>
  </a>
  {{ end }}
</div>
{{ end }}
<style>
.book-tags {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.375rem;
  margin-top: 1.5rem;
  padding-top: 1rem;
  border-top: 1px solid var(--gray-200);
  font-size: 0.8rem;
}
.book-tags-label {
  color: var(--gray-500);
}
.book-tags a.book-badge {
  text-decoration: none;
}
</style>
