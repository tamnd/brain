<div class="book-theme-toggle-wrap">
  <button id="book-theme-toggle" title="Toggle light / dark mode">
    <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <span id="theme-label">Light</span>
  </button>
</div>
<style>
.book-theme-toggle-wrap {
  padding: 0.75rem 1rem 1rem;
}
#book-theme-toggle {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.375rem 0.75rem;
  background: var(--gray-100);
  border: 1px solid var(--gray-200);
  border-radius: 0.375rem;
  color: var(--body-font-color);
  cursor: pointer;
  font-size: 0.8rem;
  width: 100%;
}
#book-theme-toggle:hover {
  background: var(--gray-200);
}
</style>
<script>
(function () {
  var btn     = document.getElementById("book-theme-toggle");
  var sun     = document.getElementById("icon-sun");
  var moon    = document.getElementById("icon-moon");
  var label   = document.getElementById("theme-label");
  var html    = document.documentElement;

  function isDark() {
    var t = html.getAttribute("data-theme");
    if (t === "dark") return true;
    if (t === "light") return false;
    return window.matchMedia("(prefers-color-scheme: dark)").matches;
  }

  function apply(dark) {
    html.setAttribute("data-theme", dark ? "dark" : "light");
    sun.style.display  = dark ? "block" : "none";
    moon.style.display = dark ? "none"  : "block";
    label.textContent  = dark ? "Dark"  : "Light";

    /* swap syntax CSS media queries to always-on so the toggle works */
    document.querySelectorAll("link[href*='syntax-']").forEach(function (el) {
      el.removeAttribute("media");
    });
    document.querySelector("link[href*='syntax-light']").disabled = dark;
    document.querySelector("link[href*='syntax-dark']").disabled  = !dark;
  }

  apply(isDark());

  btn.addEventListener("click", function () {
    var dark = !isDark();
    localStorage.setItem("theme", dark ? "dark" : "light");
    apply(dark);
  });
})();
</script>
