{{ if and .GitInfo .Site.Params.BookLastChangeLink }}
<div class="book-last-change">
  {{- $date := partial "docs/date" (dict "Date" .Lastmod "Format" .Site.Params.BookDateFormat) -}}
  <a class="book-commit-link" href="{{ partial "docs/links/commit" . }}" title='Last modified by {{ .GitInfo.AuthorName }} | {{ $date }}' target="_blank" rel="noopener">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
    <span>{{ $date }}</span>
  </a>
</div>
{{ end }}

{{ partial "docs/prev-next" . }}
