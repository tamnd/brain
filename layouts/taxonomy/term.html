{{ define "main" }}
{{- $pages := .Pages.ByLastmod.Reverse -}}

<main id="content" class="home-feed">
  <header class="home-feed__header home-feed__header--tag">
    <a href="{{ (site.GetPage "/tags").RelPermalink }}" class="brain-back-link">← All tags</a>
    <div class="home-feed__tag-label">Tag</div>
    <h1 class="home-feed__title">{{ .Title }}</h1>
    <p class="home-feed__subtitle">{{ len $pages }} {{ if eq (len $pages) 1 }}note{{ else }}notes{{ end }}</p>
  </header>

  <div class="home-feed__list">
    {{ range $pages }}{{ partial "feed-item.html" . }}{{ end }}
  </div>
</main>
{{ end }}
