{{ define "main" }}
<main id="content" class="tags-page">
  <header class="tags-page__header">
    <h1 class="tags-page__title">Tags</h1>
    <p class="tags-page__subtitle">{{ len .Data.Terms }} tags across {{ len site.RegularPages }} notes</p>
  </header>

  <div class="tags-page__cloud">
    {{ range $term, $pages := .Data.Terms.ByCount }}
    <a href="{{ $.Site.BaseURL }}tags/{{ $term | urlize }}/" class="tags-page__tag">
      <span class="tags-page__tag-name">{{ $term }}</span>
      <span class="tags-page__tag-count">{{ len $pages }}</span>
    </a>
    {{ end }}
  </div>
</main>
{{ end }}
