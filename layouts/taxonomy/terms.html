{{ define "main" }}
{{- $totalPages := 0 -}}
{{- range .Data.Terms -}}{{- $totalPages = add $totalPages .Count -}}{{- end -}}

<main id="content" class="tags-page">
  <header class="tags-page__header">
    <h1 class="tags-page__title">Tags</h1>
    <p class="tags-page__subtitle">{{ len .Data.Terms }} tags · {{ $totalPages }} notes</p>
  </header>

  <div class="tags-page__cloud">
    {{- range .Data.Terms.ByCount -}}
    <a href="{{ .Page.RelPermalink }}" class="tags-page__tag">
      <span class="tags-page__tag-name">{{ .Name }}</span>
      <span class="tags-page__tag-count">{{ .Count }}</span>
    </a>
    {{- end -}}
  </div>
</main>
{{ end }}
