baseURL = "https://tamnd.github.io/brain/"
title = "brain"

enableGitInfo = true
enableRobotsTXT = true
enableEmoji = true

[frontmatter]
  date    = ["date", "publishDate"]
  lastmod = ["lastmod", "date", "publishDate"]

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[module]
  [[module.imports]]
    path = "github.com/tamnd/hugo-brainy"

[languages]
  [languages.en]
    label = "English"
    locale = "en-US"
    contentDir = "content/en"
    weight = 1
  [languages.zh]
    label = "中文"
    locale = "zh-CN"
    contentDir = "content/zh"
    weight = 2
  [languages.vi]
    label = "Tiếng Việt"
    locale = "vi"
    contentDir = "content/vi"
    weight = 3
  [languages.ja]
    label = "日本語"
    locale = "ja"
    contentDir = "content/ja"
    weight = 4

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block  = [["$$", "$$"], ["\\[", "\\]"]]
      inline = [["$", "$"],   ["\\(", "\\)"]]

[params]
  description = "Personal knowledge base"

  [params.navbar]
    displayTitle = true
    displayLogo = false
    width = "full"

  [params.theme]
    default = "system"
    displayToggle = true

  [params.search]
    enable = true
    type = "flexsearch"
    [params.search.flexsearch]
      index = "summary"

  [params.editURL]
    enable = true
    base = "https://github.com/tamnd/brain/edit/main/content"

  [params.footer]
    enable = true
    displayCopyright = false
    displayPoweredBy = false

  # KaTeX math rendering ($...$ inline, $$...$$ display)
  math = true

  [params.page.contextMenu]
    enable = true

[[menu.main]]
  name = "Graph"
  weight = 1
  [menu.main.params]
    type = "graph"

[[menu.main]]
  name = "Mindmap"
  weight = 2
  [menu.main.params]
    type = "tree"

[[menu.main]]
  name = "Calendar"
  weight = 3
  [menu.main.params]
    type = "calendar"

[[menu.main]]
  name = "Search"
  weight = 4
  [menu.main.params]
    type = "search"

[[menu.main]]
  name = "Theme"
  weight = 5
  [menu.main.params]
    type = "theme-toggle"

[[menu.main]]
  name = "Language"
  weight = 6
  [menu.main.params]
    type = "language-switch"

[outputs]
  home     = ["html"]
  section  = ["html"]
  page     = ["html"]
  taxonomy = ["html"]
  term     = ["html"]
