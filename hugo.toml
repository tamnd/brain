baseURL = "https://tamnd.github.io/brain/"
title = "brain"

enableGitInfo = true
enableRobotsTXT = true
enableEmoji = true

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-US"
    contentDir = "content/en"
    weight = 1
  [languages.zh]
    languageName = "中文"
    languageCode = "zh-CN"
    contentDir = "content/zh"
    weight = 2
  [languages.vi]
    languageName = "Tiếng Việt"
    languageCode = "vi"
    contentDir = "content/vi"
    weight = 3
  [languages.ja]
    languageName = "日本語"
    languageCode = "ja"
    contentDir = "content/ja"
    weight = 4

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block  = [["$$", "$$"], ["\\[", "\\]"]]
      inline = [["$", "$"],   ["\\(", "\\)"]]

[params]
  description = "Personal knowledge base"

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.theme]
    default = "system"
    displayToggle = true

  [params.search]
    enable = true
    type = "flexsearch"
    [params.search.flexsearch]
      index = "content"

  [params.editURL]
    enable = true
    base = "https://github.com/tamnd/brain/edit/main/content"

  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = false

  # KaTeX math rendering ($...$ inline, $$...$$ display)
  math = true
